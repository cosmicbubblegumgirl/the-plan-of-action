    <path d="M38 64h13M38 76h15M77 64h13M77 76h9" stroke="#263837" stroke-linecap="round" stroke-width="4" opacity=".72"/>
    <ellipse cx="94" cy="82" rx="12" ry="5" fill="#121a1f" stroke="#7fdad2" stroke-width="2"/>
    <path d="M82 82v12c0 3 5.4 5 12 5s12-2 12-5V82" fill="#15242a" stroke="#7fdad2" stroke-width="2"/>
