<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 144" role="img" aria-labelledby="title desc">
  <title id="title">SAP Spellbook Academy logo</title>
  <desc id="desc">An original academy crest and wordmark for the two-stream certification study app.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="11" y1="10" x2="120" y2="121" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23202d"/>
      <stop offset=".55" stop-color="#17161d"/>
      <stop offset="1" stop-color="#10161a"/>
    </linearGradient>
    <linearGradient id="logo-cover" x1="22" y1="38" x2="108" y2="109" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c8bc"/>
      <stop offset=".52" stop-color="#705de8"/>
      <stop offset="1" stop-color="#e9b94e"/>
